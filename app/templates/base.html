{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mening Portfoliom{% endblock %}</title>
    
    <style>
        /* CSS O'zgaruvchilar - Claude.ai uslubidagi qaymoq va toza ranglar */
        :root {
            --bg-color: #FAF9F6; 
            --text-color: #2D2D2D; 
            --text-muted: #666666;
            --accent-color: #D97757; 
            --border-color: #E8E6E1;
            --nav-bg: #FAF9F6;
        }

        /* Umumiy sozlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* MUHIM: Navbarni fixed qilganda content uning tagiga kirib ketmasligi uchun kafolatlangan joy */
            padding-top: 90px; 
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navbar qismi (FIXED holatda) */
        header {
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            position: fixed; /* Ekranda qotirib qo'yish */
            top: 0;
            left: 0;
            width: 100%; /* To'liq eniga cho'zilish */
            height: 70px; /* Navbar balandligi qat'iy belgilandi */
            z-index: 1000;
        }

        .navbar {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: color 0.2s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--text-color);
        }

        /* Mobil menyu tugmasi */
        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
        }

        /* Asosiy kontent qismi */
        main {
            flex: 1; 
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem; /* Yuqori qismdagi padding biroz qisqartirildi, sababi bodyda joy yetarli */
            width: 100%;
        }

        /* Footer qismi */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: auto;
        }

        /* Moslashuvchanlik (Responsive Design) */
        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 70px; 
                left: 0;
                right: 0;
                background-color: var(--nav-bg);
                flex-direction: column;
                align-items: center;
                padding: 0;
                gap: 0;
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.3s ease;
                border-bottom: 1px solid transparent;
            }

            .nav-links.active {
                max-height: 300px;
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 0;
                box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            }

            .nav-links a {
                padding: 1rem;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="{% url 'home' %}" class="logo">MIUCEO</a>
            
            <div class="nav-links" id="navLinks">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'about' %}">About</a>
                <a href="{% url 'blog' %}">Blog</a>
                <a href="/projects/">Projects</a>
                <a href="/contact/">Contact</a>
            </div>

            <button class="hamburger" id="hamburgerBtn" aria-label="Menyuni ochish">
                ☰
            </button>
        </nav>
    </header>

    <main>
        <!-- Tepadan tushib turuvchi xabarlar uchun (Agar ishlatsangiz) -->
        {% if messages %}
            <div style="margin-bottom: 2rem;">
            {% for msg in messages %}
                <div style="background-color: #00b84c; color: white; padding: 1rem; border-radius: 8px; text-align: center; margin-bottom: 1rem;">
                    {{ msg }}
                </div>
            {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Barcha huquqlar himoyalangan.</p>
    </footer>

    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');

        hamburgerBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            if (navLinks.classList.contains('active')) {
                hamburgerBtn.innerHTML = '✕';
            } else {
                hamburgerBtn.innerHTML = '☰';
            }
        });

        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
