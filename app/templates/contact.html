{% extends 'base.html' %}

{% block title %}Aloqa - Mening Portfoliom{% endblock %}

<style>
    /* =========================================
       FAQAT LINKLAR UCHUN IXCHAM DIZAYN
       ========================================= */

    .contact-container {
        max-width: 400px; /* Faqat linklar uchun yetarli kenglik */
        margin: 6rem auto; /* Sahifa markazida joylashishi uchun */
        text-align: center;
        padding: 0 1rem;
    }

    .contact-container h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--text-color);
        margin-bottom: 2rem;
        letter-spacing: -1px;
    }

    .links-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    /* Tugmalar dizayni */
    .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
        padding: 0.9rem 1.5rem;
        background-color: transparent;
        border: 1px solid var(--border-color);
        border-radius: 14px;
        text-decoration: none;
        color: var(--text-color);
        font-weight: 500;
        font-size: 1.1rem;
        transition: all 0.2s ease-in-out;
    }

    .social-btn:hover {
        background-color: var(--text-color);
        color: var(--bg-color);
        border-color: var(--text-color);
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .social-btn svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
    }

    /* Telefon tugmasi (Asosiy CTA) */
    .phone-cta {
        background-color: var(--text-color);
        color: var(--bg-color);
        border: none;
    }

    .phone-cta:hover {
        opacity: 0.9;
    }

    /* Mobil moslashuv */
    @media (max-width: 480px) {
        .contact-container {
            margin: 4rem auto;
        }
        .contact-container h1 {
            font-size: 2rem;
        }
    }
</style>
