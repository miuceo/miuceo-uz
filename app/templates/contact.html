<style>
    /* =========================================
       IXCHAM VA ANIQLIKDAGI ALOQA SAHIFASI
       ========================================= */

    /* Ekranning markazida joylashuvchi ixcham quti */
    .contact-card-wrapper {
        max-width: 750px; /* Juda ixcham kenglik */
        margin: 4rem auto; /* Tepadan va pastdan bo'shliq */
        display: grid;
        grid-template-columns: 1fr 1fr; /* 50% linklar, 50% rasm */
        gap: 2rem;
        align-items: stretch;
    }

    /* -----------------------------------------
       CHAP QISM: Sarlavha va Linklar
       ----------------------------------------- */
    .contact-links-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .contact-links-section h1 {
        font-size: 2.8rem;
        font-weight: 700;
        letter-spacing: -1px;
        color: var(--text-color);
        margin-bottom: 1.5rem;
        font-family: inherit;
    }

    .links-list {
        display: flex;
        flex-direction: column;
        gap: 0.8rem; /* Linklar orasi juda ixcham */
    }

    /* Ijtimoiy tarmoq tugmalari */
    .social-btn {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 0.8rem 1.2rem;
        background-color: transparent;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        text-decoration: none;
        color: var(--text-color);
        font-weight: 500;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.2s ease;
    }

    .social-btn:hover {
        background-color: var(--text-color);
        color: var(--bg-color);
        border-color: var(--text-color);
        transform: translateY(-2px);
    }

    .social-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
    }

    /* Telefon qo'ng'iroq (CTA) tugmasi */
    .phone-cta {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 1rem 1.2rem;
        background-color: var(--text-color);
        color: var(--bg-color);
        border: none;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 500;
        font-size: 1.05rem;
        font-family: inherit;
        margin-top: 0.5rem;
        transition: all 0.2s ease;
    }

    .phone-cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        opacity: 0.95;
    }

    .phone-cta svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
    }

    /* -----------------------------------------
       O'NG QISM: Rasm
       ----------------------------------------- */
    .contact-image-wrapper {
        width: 100%;
        height: 100%;
        min-height: 320px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border-color);
    }

    .contact-image-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
    }

    /* -----------------------------------------
       MOBIL MOSLASHUVCHANLIK
       ----------------------------------------- */
    @media (max-width: 768px) {
        .contact-card-wrapper {
            grid-template-columns: 1fr; /* Telefonda ustma-ust tushadi */
            max-width: 450px;
            margin: 2rem auto;
            gap: 1.5rem;
            padding: 0 1rem;
        }

        .contact-image-wrapper {
            min-height: 250px;
        }
    }
</style>
